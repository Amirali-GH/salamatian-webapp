###################################################################
# نسخه Mirror - برای محیط‌های داخل ایران (رانفلر)
#
# استفاده:
#     docker compose -f docker-compose.mirror.yml build
#     docker compose -f docker-compose.mirror.yml up -d
#     docker compose -f docker-compose.mirror.yml exec web alembic upgrade head
#     docker compose -f docker-compose.mirror.yml exec web python scripts/seed_admin.py
#
# بررسی وضعیت:
#     docker compose -f docker-compose.mirror.yml ps
#     docker compose -f docker-compose.mirror.yml logs web --tail=50
#
# آپدیت سرویس‌ها:
#     docker compose -f docker-compose.mirror.yml build web worker beat
#     docker compose -f docker-compose.mirror.yml up -d --no-deps web worker beat
#
# میرورهای استفاده‌شده:
#   Docker   → mirror-docker.runflare.com
#   apt/deb  → mirror-linux.runflare.com/ubuntu
#   PyPI     → mirror-pypi.runflare.com/simple

# git pull
# docker-compose -f docker-compose.mirror.yml stop web
# docker-compose -f docker-compose.mirror.yml rm web
# docker-compose -f docker-compose.mirror.yml build web
# docker-compose -f docker-compose.mirror.yml up -d web
# docker-compose -f docker-compose.mirror.yml restart nginx
###################################################################

services:
  postgres:
    image: mirror-docker.runflare.com/postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXPOSED_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: mirror-docker.runflare.com/redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_EXPOSED_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256m

  web:
    build:
      context: .
      dockerfile: Dockerfile.mirror
      target: production
    command: uvicorn app.main:app --host ${HOST_IP} --port ${HOST_PORT} --workers ${WORKER_COUNT} --proxy-headers --forwarded-allow-ips='*'
    user: root
    env_file: .env
    volumes:
      - storage_data:/app/storage/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HOST_PORT}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m

  worker:
    build:
      context: .
      dockerfile: Dockerfile.mirror
      target: production
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=warning --concurrency=2
    user: root
    env_file: .env
    volumes:
      - storage_data:/app/storage/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  beat:
    build:
      context: .
      dockerfile: Dockerfile.mirror
      target: production
    command: sh -c "rm -f /tmp/celerybeat-schedule* && exec celery -A app.workers.celery_app.celery_app beat --loglevel=warning --schedule=/tmp/celerybeat-schedule"
    user: root
    volumes:
      - storage_data:/app/storage/uploads
    env_file: .env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m

  nginx:
    image: mirror-docker.runflare.com/nginx:alpine
    ports:
      - "${NGINX_PORT}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - storage_data:/app/storage/uploads:ro
    restart: unless-stopped
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  pg_data:
  redis_data:
  storage_data:
