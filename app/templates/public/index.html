{% extends "base.html" %}
{% block title %}سلامتیان — خودروهای کارکرده{% endblock %}
{% block body %}
<header class="public-header">
  <div class="brand">سلامتیان</div>
  <nav>
    <a href="#cars">خودروها</a>
    <a href="#consult">مشاوره</a>
    <a href="#sell">فروش خودرو</a>
  </nav>
</header>

<main class="public-main" x-data="carsApp()" x-init="fetchCars()">
  <section class="filters">
    <input x-model="filters.brand" @input.debounce.300ms="fetchCars()" placeholder="برند">
    <input x-model="filters.model" @input.debounce.300ms="fetchCars()" placeholder="مدل">
    <input type="number" x-model="filters.year_min" @change="fetchCars()" placeholder="از سال">
    <input type="number" x-model="filters.year_max" @change="fetchCars()" placeholder="تا سال">
  </section>
  <section id="cars" class="cars-grid">
    <template x-for="c in items" :key="c.id">
      <article class="car-card" @click="openCar(c.id)">
        <div class="car-thumb">
          <svg viewBox="0 0 260 170" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#edfaf6"/>
                <stop offset="100%" stop-color="#f0f4f3"/>
              </linearGradient>
              <linearGradient id="cbody" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1dc8a8"/>
                <stop offset="100%" stop-color="#14987e"/>
              </linearGradient>
            </defs>
            <!-- BG -->
            <rect width="260" height="170" fill="url(#cbg)"/>
            <!-- Dot grid decoration -->
            <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
              <circle cx="1.5" cy="1.5" r="1" fill="#c5d9d5" opacity=".5"/>
            </pattern>
            <rect width="260" height="170" fill="url(#dots)"/>
            <!-- Ground dashed line -->
            <line x1="14" y1="143" x2="246" y2="143" stroke="#b0ccc8" stroke-width="1" stroke-dasharray="5 4"/>
            <!-- Car lower body -->
            <path d="M38,109 L38,134 Q38,140 44,140 L216,140 Q222,140 222,134 L222,109 Z" fill="url(#cbody)"/>
            <!-- Car cabin/roof -->
            <path d="M74,109 C77,86 92,72 117,68 L163,68 C186,72 193,86 190,109 Z" fill="url(#cbody)"/>
            <!-- Roof shine -->
            <ellipse cx="133" cy="79" rx="30" ry="7" fill="rgba(255,255,255,0.13)"/>
            <!-- Front window (left – car faces left) -->
            <path d="M89,73 C81,85 76,96 76,108 L89,108 L104,75 Z" fill="rgba(163,228,232,0.38)"/>
            <!-- Side window -->
            <path d="M108,69 L160,69 L170,108 L100,108 Z" fill="rgba(163,228,232,0.28)"/>
            <!-- Rear window (right) -->
            <path d="M163,70 C176,77 186,91 188,108 L173,108 L161,74 Z" fill="rgba(163,228,232,0.35)"/>
            <!-- Window divider (B-pillar) -->
            <line x1="135" y1="69" x2="135" y2="108" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
            <!-- Door seam -->
            <line x1="136" y1="109" x2="136" y2="139" stroke="rgba(0,0,0,0.09)" stroke-width="1"/>
            <!-- Headlight (left) -->
            <path d="M38,107 L38,121 L48,121 L43,107 Z" fill="rgba(255,248,180,0.8)"/>
            <rect x="38" y="121" width="9" height="4" rx="2" fill="rgba(255,200,120,0.55)"/>
            <!-- Taillight (right) -->
            <rect x="216" y="111" width="6" height="11" rx="2.5" fill="rgba(255,65,65,0.55)"/>
            <!-- Door handle front -->
            <rect x="98" y="122" width="14" height="4" rx="2" fill="rgba(255,255,255,0.22)"/>
            <!-- Door handle rear -->
            <rect x="152" y="122" width="14" height="4" rx="2" fill="rgba(255,255,255,0.22)"/>
            <!-- Front wheel (left) -->
            <circle cx="80" cy="140" r="21" fill="#0e1c1a"/>
            <circle cx="80" cy="140" r="13" fill="#1a3230"/>
            <circle cx="80" cy="140" r="6" fill="#18b093"/>
            <circle cx="80" cy="140" r="2.5" fill="#a3e4d7"/>
            <line x1="80" y1="127" x2="80" y2="134" stroke="#2d5450" stroke-width="2" stroke-linecap="round"/>
            <line x1="93" y1="140" x2="86" y2="140" stroke="#2d5450" stroke-width="2" stroke-linecap="round"/>
            <line x1="80" y1="153" x2="80" y2="146" stroke="#2d5450" stroke-width="2" stroke-linecap="round"/>
            <line x1="67" y1="140" x2="74" y2="140" stroke="#2d5450" stroke-width="2" stroke-linecap="round"/>
            <!-- Rear wheel (right) -->
            <circle cx="183" cy="140" r="21" fill="#0e1c1a"/>
            <circle cx="183" cy="140" r="13" fill="#1a3230"/>
            <circle cx="183" cy="140" r="6" fill="#18b093"/>
            <circle cx="183" cy="140" r="2.5" fill="#a3e4d7"/>
            <line x1="183" y1="127" x2="183" y2="134" stroke="#2d5450" stroke-width="2" stroke-linecap="round"/>
            <line x1="196" y1="140" x2="189" y2="140" stroke="#2d5450" stroke-width="2" stroke-linecap="round"/>
            <line x1="183" y1="153" x2="183" y2="146" stroke="#2d5450" stroke-width="2" stroke-linecap="round"/>
            <line x1="170" y1="140" x2="177" y2="140" stroke="#2d5450" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h3 x-text="c.brand + ' ' + c.model + ' ' + c.year"></h3>
        <p x-text="Number(c.price).toLocaleString() + ' تومان'"></p>
        <small x-text="c.location || ''"></small>
      </article>
    </template>
  </section>
  <div class="pagination">
    <button @click="prev()" :disabled="offset === 0">قبلی</button>
    <span x-text="offset + '–' + Math.min(offset+limit, total) + ' از ' + total"></span>
    <button @click="next()" :disabled="offset+limit >= total">بعدی</button>
  </div>

  <section id="consult" class="form-card">
    <h2>درخواست مشاوره</h2>
    <form @submit.prevent="submitConsultation($event)">
      <input name="name" placeholder="نام" required>
      <input name="phone" placeholder="تلفن" required>
      <textarea name="description" placeholder="توضیحات"></textarea>
      <button>ارسال</button>
    </form>
  </section>

  <section id="sell" class="form-card">
    <h2>فروش خودرو</h2>
    <form @submit.prevent="submitSell($event)" enctype="multipart/form-data">
      <input name="name" placeholder="نام" required>
      <input name="phone" placeholder="تلفن" required>
      <input name="car_brand" placeholder="برند">
      <input name="car_model" placeholder="مدل">
      <input type="number" name="year" placeholder="سال">
      <input type="number" name="mileage" placeholder="کارکرد">
      <textarea name="description" placeholder="توضیحات"></textarea>
      <input type="file" name="images" multiple accept="image/*">
      <button>ارسال</button>
    </form>
  </section>
</main>

<div x-data="{ open:false, html:'' }" x-show="open" @keydown.escape.window="open=false" class="modal" x-cloak
     @open-car.window="open=true; fetch('/car/'+$event.detail).then(r=>r.text()).then(t=>html=t)">
  <div class="modal-body" @click.outside="open=false" x-html="html"></div>
</div>

<script>
function carsApp() {
  return {
    items: [], total: 0, limit: 12, offset: 0,
    filters: { brand: '', model: '', year_min: '', year_max: '' },
    qs() {
      const p = new URLSearchParams({ limit: this.limit, offset: this.offset });
      for (const [k,v] of Object.entries(this.filters)) if (v) p.set(k, v);
      return p.toString();
    },
    async fetchCars() {
      const r = await fetch('/api/cars?' + this.qs());
      const j = await r.json();
      this.items = j.items; this.total = j.total;
    },
    next() { this.offset += this.limit; this.fetchCars(); },
    prev() { this.offset = Math.max(0, this.offset - this.limit); this.fetchCars(); },
    openCar(id) { window.dispatchEvent(new CustomEvent('open-car', { detail: id })); },
    async submitConsultation(ev) {
      const f = new FormData(ev.target);
      const r = await fetch('/api/leads/consultation', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify(Object.fromEntries(f)),
      });
      if (r.ok) { alert('ارسال شد'); ev.target.reset(); } else alert('خطا');
    },
    async submitSell(ev) {
      const r = await fetch('/api/leads/sell', { method: 'POST', body: new FormData(ev.target) });
      if (r.ok) { alert('ارسال شد'); ev.target.reset(); } else alert('خطا');
    },
  }
}
</script>
{% endblock %}
