###################################################################
# First time
#     docker compose build
#     docker compose up -d
#     docker compose exec web alembic upgrade head
#     docker compose exec web python scripts/seed_admin.py
#
# Check status
#     docker compose ps
#     docker compose logs web --tail=50
#
# Update Next
#     docker compose build web worker beat
#     docker compose up -d --no-deps web worker beat
###################################################################

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXPOSED_PORT}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_EXPOSED_PORT}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256m

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: uvicorn app.main:app --host ${HOST_IP} --port ${HOST_PORT} --workers ${WORKER_COUNT} --proxy-headers --forwarded-allow-ips='*'
    env_file: .env
    volumes:
      - storage_data:/app/storage/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${HOST_PORT}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 512m

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=warning --concurrency=2
    env_file: .env
    volumes:
      - storage_data:/app/storage/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m

  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=warning --schedule=/tmp/celery/celerybeat-schedule
    env_file: .env
    volumes:
      - storage_data:/app/storage/uploads
      - beat_data:/tmp/celery
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_PORT}:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - storage_data:/app/storage/uploads:ro
    restart: unless-stopped
    depends_on:
      - web
    deploy:
      resources:
        limits:
          memory: 64m
volumes:
  pg_data:
  redis_data:
  storage_data:
  beat_data:  
