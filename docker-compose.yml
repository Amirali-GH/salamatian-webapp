services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: salamatian
      POSTGRES_PASSWORD: salamatian
      POSTGRES_DB: salamatian
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salamatian"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    volumes:
      - .:/app
      - storage_data:/app/storage/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file: .env
    volumes:
      - .:/app
      - storage_data:/app/storage/uploads
    depends_on:
      - redis
      - postgres

  beat:
    build: .
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - .:/app
      - storage_data:/app/storage/uploads
    depends_on:
      - redis
      - postgres

volumes:
  pg_data:
  storage_data:
